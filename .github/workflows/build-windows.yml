name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-windows.yml"
      - "requirements.txt"
      - "sukunatchi.spec"
      - "sukunatchi-installer.iss"
      - "src/**"
      - "carcaza.jpeg"
      - "sukunas.jpg"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt "pyinstaller>=6.6,<7"

      - name: Build Windows Executable
        shell: pwsh
        run: |
          pyinstaller --clean --noconfirm sukunatchi.spec

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $installer = Join-Path $env:RUNNER_TEMP "innosetup.exe"
          Invoke-WebRequest https://jrsoftware.org/download.php/is.exe -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/SP-" -Wait
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found at $iscc"
          }
          "ISCC_PATH=$iscc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows Installer
        shell: pwsh
        run: |
          $version = "1.0.${{ github.run_number }}"
          & $env:ISCC_PATH "/DAppVersion=$version" "/DSourceExe=dist\Sukunatchi.exe" .\sukunatchi-installer.iss

      - name: Prepare Installer Artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact-installer | Out-Null
          Copy-Item .\installer-dist\Sukunatchi-Setup.exe .\artifact-installer\Sukunatchi-Setup.exe
          $hash = (Get-FileHash .\artifact-installer\Sukunatchi-Setup.exe -Algorithm SHA256).Hash.ToLower()
          Set-Content .\artifact-installer\SHA256.txt "$hash  Sukunatchi-Setup.exe"
          Set-Content .\artifact-installer\README-Windows.txt @'
          Sukunatchi for Windows

          File:
          - Sukunatchi-Setup.exe

          The installer:
          - installs Sukunatchi in %LOCALAPPDATA%\Programs\Sukunatchi
          - creates a desktop shortcut
          - creates a Start menu shortcut

          Save path:
          - %APPDATA%\Sukunatchi\save\state.json

          Run the installer and follow the wizard.
          '@

      - name: Prepare Executable Artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact-exe | Out-Null
          Copy-Item .\dist\Sukunatchi.exe .\artifact-exe\Sukunatchi.exe
          $hash = (Get-FileHash .\artifact-exe\Sukunatchi.exe -Algorithm SHA256).Hash.ToLower()
          Set-Content .\artifact-exe\SHA256.txt "$hash  Sukunatchi.exe"
          Set-Content .\artifact-exe\README-Windows.txt @'
          Sukunatchi for Windows

          File:
          - Sukunatchi.exe

          This is the standalone executable generated by PyInstaller.
          No installer is included in this artifact.

          Save path:
          - %APPDATA%\Sukunatchi\save\state.json

          Run Sukunatchi.exe directly.
          '@

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sukunatchi-windows-installer
          path: artifact-installer/*
          if-no-files-found: error
          retention-days: 30

      - name: Upload Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sukunatchi-windows-exe
          path: artifact-exe/*
          if-no-files-found: error
          retention-days: 30
